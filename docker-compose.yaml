services:
  mindly:
    build: .
    image: mindly:latest
    volumes:
      - ./data:/app/data
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      - LLM_MODEL=${LLM_MODEL:-qwen/qwen3-30b-a3b-instruct:free}
      - MEMORY_DIR=/app/data/memory
      - WANDB_API_KEY=${WANDB_API_KEY:-}
    stdin_open: true
    tty: true
    command: ["chat", "--user", "demo", "--persona", "wellness_friend"]
